<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">

<title>Kontakt</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#1c1c1e;
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

h1{
margin-top:0;
}

button{
width:100%;
margin:8px 0;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

.instagram{background:#E1306C;color:white;}
.whatsapp{background:#25D366;color:white;}
.copy{background:#2c2c2e;color:white;}
.map{background:#0A84FF;color:white;}

.qr{
margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h1>Robert Exner</h1>

<p>Geboren: 03.11.2005</p>
<p>Alter: <span id="age"></span></p>

<button class="map" onclick="openMap()">📍 76199 Karlsruhe</button>

<button onclick="saveContact()">📞 Kontakt speichern</button>

<button class="whatsapp" onclick="openWhatsApp()">💬 WhatsApp</button>

<button class="instagram" onclick="openIG()">📸 Instagram</button>

<button class="copy" onclick="copyText('the_roex')">Discord kopieren</button>

<button class="copy" onclick="copyText('1053488108')">Steam kopieren</button>

<div class="qr">
<img id="qr">
</div>

</div>

<script>

const birthDate = new Date("2005-11-03");

function calculateAge(){
const today = new Date();
let age = today.getFullYear() - birthDate.getFullYear();
const m = today.getMonth() - birthDate.getMonth();

if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
age--;
}

document.getElementById("age").innerText = age;
}

calculateAge();

function openMap(){
window.open("https://maps.google.com/?q=76199+Karlsruhe");
}

function openIG(){
window.open("https://instagram.com/r.exner");
}

function openWhatsApp(){
window.open("https://wa.me/4915757636355");
}

function copyText(text){
navigator.clipboard.writeText(text);
alert("Kopiert: "+text);
}

function saveContact(){
window.location.href="tel:+4915757636355";
}

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+window.location.href;

</script>

</body>
</html>
